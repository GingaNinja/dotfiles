# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-S-Left previous-window
bind -n M-S-Right next-window

set -s escape-time 10
set -g default-terminal "screen-256color"
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# set-option -g default-command "reattach-to-user-namespace -l zsh"

set-option -g default-shell /bin/zsh
set-window-option -g mouse on
set-window-option -g xterm-keys on

set-option -g set-titles on
set -g status-interval 5

set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

set -g status-position bottom
set -g status-bg colour237
set -g status-fg colour137

set -g status-left "#[fg=colour197]#(~/.tmux/internet_info.sh) "
set -g status-right "#[fg=colour81]♫ #{music_status} #{artist}: #{track} |#[fg=colour255,bold] %a %d-%m %H:%M #[fg=colour81]|#[fg=colour165] #H"
set -g status-right-length 100
set -g status-left-length 70

set-window-option -g aggressive-resize
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour170]#F '

set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'robhurring/tmux-spotify'
# pwittchen/tmux-plugin-spotify'

run 'tpack init'

